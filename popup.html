<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMS Ops Launcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="hero">
      <div class="hero__badge">EMS</div>
      <div>
        <p class="hero__kicker">Ops Command Center</p>
        <h1 class="hero__title">Dashboard Launcher</h1>
      </div>
    </section>

    <section class="panel">
      <p class="panel__description">
        Abre o painel operacional com foco em casos sem escalation type para L1, L2 e Event BR.
      </p>

      <button class="launch-btn" id="btnOpen" type="button">
        <span class="spinner" id="spinner" aria-hidden="true"></span>
        <span id="btnIcon" aria-hidden="true">⚡</span>
        <span id="btnLabel">Abrir Painel Ops</span>
      </button>

      <p class="status" id="status" aria-live="polite"></p>

      <div class="chips" aria-label="Lanes">
        <span class="chip chip--critical">Crítico</span>
        <span class="chip chip--high">Alto</span>
        <span class="chip chip--medium">Atenção</span>
        <span class="chip chip--awaiting">Aguardando</span>
        <span class="chip chip--normal">Normal</span>
        <span class="chip chip--orphan">Órfão</span>
      </div>
    </section>

    <footer class="footer">
      ServiceNow • EMS-OLA-AMER • Event BR
    </footer>
  </main>

  <script src="config.js"></script>
  <script src="ems-ops.js"></script>
  <script src="popup.js"></script>
</body>
</html>
